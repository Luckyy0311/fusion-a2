<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void: #07070f;
  --deep: #0d0c1e;
  --surface: #12111f;
  --surface2: #1a1929;
  --surface3: #222136;
  --border: rgba(130,120,255,0.15);
  --border2: rgba(130,120,255,0.08);
  --purple: #7c6ff7;
  --purple2: #534AB7;
  --purple3: #a99ef9;
  --purple-glow: rgba(124,111,247,0.4);
  --teal: #00d4aa;
  --teal-dim: rgba(0,212,170,0.15);
  --amber: #f0a030;
  --amber-dim: rgba(240,160,48,0.15);
  --red: #f06060;
  --red-dim: rgba(240,96,96,0.15);
  --text: #e8e7f8;
  --text2: #9896c8;
  --text3: #5f5e8a;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --r: 10px;
  --r2: 16px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}

html { font-size: 16px; }
body {
  font-family: var(--font-display);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════
   INTRO OVERLAY
═══════════════════════════════════════ */
#intro {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--void);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}

.intro-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(124,111,247,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,111,247,0.07) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridAppear 1s ease forwards;
  opacity: 0;
}
@keyframes gridAppear { to { opacity: 1; } }

.intro-orb {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,111,247,0.22) 0%, transparent 65%);
  animation: orbBreath 3s ease-in-out infinite alternate;
}
@keyframes orbBreath {
  from { transform: scale(0.8); opacity: 0.5; }
  to   { transform: scale(1.15); opacity: 1; }
}

.intro-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(124,111,247,0.2);
  animation: ringExpand var(--rd) ease-out var(--rdelay) infinite;
  opacity: 0;
}
@keyframes ringExpand {
  0%   { transform: scale(0.2); opacity: 0.8; }
  100% { transform: scale(2.5); opacity: 0; }
}

.intro-scan {
  position: absolute; left: 0; right: 0; height: 2px; top: 0;
  background: linear-gradient(90deg, transparent 0%, var(--purple) 30%, var(--purple3) 50%, var(--purple) 70%, transparent 100%);
  animation: scanLine 1.4s ease-in-out forwards;
  box-shadow: 0 0 20px var(--purple-glow);
  opacity: 0;
}
@keyframes scanLine {
  0%   { top: 0%; opacity: 0; }
  8%   { opacity: 1; }
  100% { top: 100%; opacity: 0.2; }
}

.intro-particles { position: absolute; inset: 0; pointer-events: none; }
.p-dot {
  position: absolute; border-radius: 50%;
  background: var(--purple3); opacity: 0;
  animation: pdot var(--pd) ease-out var(--pdelay) forwards;
}
@keyframes pdot {
  0%  { opacity: 0; transform: translateY(0) scale(0); }
  20% { opacity: 0.9; transform: translateY(-30px) scale(1); }
  100%{ opacity: 0; transform: translateY(-140px) scale(0.3); }
}

.intro-wordmark {
  position: relative; z-index: 2;
  display: flex; align-items: baseline; gap: 4px;
}
.intro-letter {
  font-family: var(--font-display);
  font-size: clamp(60px, 15vw, 110px);
  font-weight: 900;
  letter-spacing: -0.03em;
  color: transparent;
  background: linear-gradient(140deg, #fff 0%, var(--purple3) 45%, var(--purple2) 100%);
  -webkit-background-clip: text; background-clip: text;
  opacity: 0; transform: translateY(50px) rotateX(40deg);
  animation: liftIn 0.55s cubic-bezier(0.34,1.56,0.64,1) var(--ld) forwards;
  filter: drop-shadow(0 0 30px rgba(124,111,247,0.7));
  transform-origin: bottom center;
}
@keyframes liftIn {
  to { opacity: 1; transform: translateY(0) rotateX(0deg); }
}

.intro-beam {
  position: relative; z-index: 2;
  margin-top: 20px; height: 2px; width: 0;
  background: linear-gradient(90deg, transparent, var(--purple2), var(--purple3), var(--purple2), transparent);
  border-radius: 2px;
  animation: beamGrow 0.8s cubic-bezier(0.22,1,0.36,1) 0.95s forwards;
  box-shadow: 0 0 20px var(--purple-glow);
}
@keyframes beamGrow { to { width: clamp(240px, 65vw, 520px); } }

.intro-label {
  position: relative; z-index: 2; margin-top: 18px;
  font-family: var(--font-mono);
  font-size: clamp(10px, 2vw, 13px);
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--purple3); opacity: 0;
  animation: fadeUp 0.6s ease 1.15s forwards;
}
.intro-sub {
  position: relative; z-index: 2; margin-top: 10px;
  font-size: clamp(11px, 2.2vw, 14px);
  letter-spacing: 0.06em; color: var(--text3);
  opacity: 0; animation: fadeUp 0.6s ease 1.35s forwards;
}
@keyframes fadeUp { to { opacity: 1; } }

#intro.outro {
  animation: introExit 0.7s cubic-bezier(0.4,0,1,1) forwards;
}
@keyframes introExit {
  0%  { opacity: 1; transform: scale(1); }
  55% { opacity: 1; transform: scale(1.04); }
  100%{ opacity: 0; transform: scale(1.08); pointer-events: none; }
}

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 8888;
  background: var(--deep);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
#login-screen.show { display: flex; }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%; max-width: 420px;
  text-align: center;
  box-shadow: 0 0 80px rgba(124,111,247,0.12), 0 0 0 1px var(--border2);
  animation: cardIn 0.5s cubic-bezier(0.34,1.3,0.64,1) forwards;
}
@keyframes cardIn {
  from { transform: scale(0.88) translateY(20px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.login-logo {
  font-family: var(--font-display);
  font-size: 34px; font-weight: 900;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 0%, var(--purple3) 50%, var(--purple2) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-bottom: 6px;
  filter: drop-shadow(0 0 20px rgba(124,111,247,0.5));
}
.login-sub {
  font-size: 13px; color: var(--text3);
  letter-spacing: 0.05em; margin-bottom: 32px;
  font-family: var(--font-mono);
}
.login-field-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3);
  text-align: left; margin-bottom: 8px;
}
.login-input {
  width: 100%; padding: 13px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text);
  font-family: var(--font-mono); font-size: 14px;
  outline: none; transition: border-color var(--transition), box-shadow var(--transition);
  margin-bottom: 20px;
}
.login-input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
}
.login-input::placeholder { color: var(--text3); }

.login-btn {
  width: 100%; padding: 14px;
  background: var(--purple2); border: none;
  border-radius: var(--r); color: #fff;
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.03em;
  transition: background var(--transition), transform 0.1s, box-shadow var(--transition);
  box-shadow: 0 4px 24px rgba(83,74,183,0.4);
}
.login-btn:hover { background: var(--purple); box-shadow: 0 6px 32px rgba(124,111,247,0.5); }
.login-btn:active { transform: scale(0.98); }

.login-recent {
  margin-top: 20px; font-size: 12px; color: var(--text3);
}
.login-recent-list {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-top: 10px;
}
.recent-chip {
  padding: 5px 12px; background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 999px; font-size: 12px; color: var(--text2);
  cursor: pointer; transition: all var(--transition);
  font-family: var(--font-mono);
}
.recent-chip:hover { background: var(--surface3); border-color: var(--purple); color: var(--purple3); }

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
#app { display: none; flex-direction: column; min-height: 100vh; }
#app.show { display: flex; }

/* Background mesh */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 10% 20%, rgba(83,74,183,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 80%, rgba(0,212,170,0.04) 0%, transparent 60%),
    var(--void);
}

/* ── Topbar ─────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,7,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 0 24px;
  display: flex; align-items: center; gap: 16px; height: 56px;
}
.topbar-logo {
  font-family: var(--font-display); font-weight: 900; font-size: 20px;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, var(--purple3));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  flex-shrink: 0;
}
.topbar-badge {
  padding: 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  font-family: var(--font-mono);
}
.tb-purple { background: rgba(124,111,247,0.15); color: var(--purple3); border: 1px solid rgba(124,111,247,0.25); }
.tb-teal   { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(0,212,170,0.25); }
.tb-amber  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,160,48,0.25); }

.topbar-spacer { flex: 1; }

.user-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 999px;
  cursor: pointer; transition: all var(--transition);
}
.user-pill:hover { border-color: var(--purple); background: var(--surface3); }
.user-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple2), var(--purple3));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.user-name { font-size: 13px; font-weight: 600; color: var(--text2); }

.submissions-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; background: transparent;
  border: 1px solid var(--border); border-radius: 999px;
  cursor: pointer; transition: all var(--transition);
  font-family: var(--font-display); font-size: 13px;
  font-weight: 500; color: var(--text3);
}
.submissions-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }

/* ── Layout ─────────────────────────── */
.main-layout {
  flex: 1; display: grid;
  grid-template-columns: 260px 1fr;
  position: relative; z-index: 1;
}

/* ── Sidebar ─────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border2);
  padding: 20px 0;
  overflow-y: auto;
  position: sticky; top: 56px;
  height: calc(100vh - 56px);
}

.sidebar-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text3);
  padding: 0 20px; margin-bottom: 6px; margin-top: 16px;
}
.sidebar-section-label:first-child { margin-top: 0; }

.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  cursor: pointer; transition: all var(--transition);
  border-left: 2px solid transparent;
  position: relative;
}
.sidebar-item:hover { background: rgba(124,111,247,0.06); }
.sidebar-item.active {
  background: rgba(124,111,247,0.1);
  border-left-color: var(--purple);
}

.si-num {
  font-family: var(--font-mono); font-size: 10px;
  font-weight: 700; color: var(--text3);
  width: 20px; flex-shrink: 0;
}
.sidebar-item.active .si-num { color: var(--purple3); }

.si-title {
  font-size: 12.5px; font-weight: 500; color: var(--text2);
  line-height: 1.35; flex: 1;
}
.sidebar-item.active .si-title { color: var(--text); }

.si-status {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--surface3); flex-shrink: 0;
  border: 1px solid var(--border);
}
.si-status.submitted { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 6px var(--teal); }
.si-status.draft { background: var(--amber); border-color: var(--amber); }

/* ── Main content ─────────────────────── */
.main-content {
  padding: 28px 32px;
  max-width: 900px;
  width: 100%;
}

/* ── Question Header ──────────────────── */
.q-header {
  margin-bottom: 24px;
  animation: contentIn 0.3s ease forwards;
}
@keyframes contentIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-eyebrow {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px;
}

.q-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.q-num-badge {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  padding: 4px 12px; background: var(--purple2);
  border-radius: 999px; color: #fff; flex-shrink: 0;
}
.q-title {
  font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
  color: var(--text); flex: 1;
}
.q-marks {
  font-family: var(--font-mono); font-size: 12px;
  padding: 4px 12px; background: rgba(124,111,247,0.12);
  border: 1px solid rgba(124,111,247,0.25);
  border-radius: 999px; color: var(--purple3);
}

.q-desc {
  font-size: 14px; line-height: 1.7; color: var(--text2);
  margin-bottom: 20px;
}

/* ── Cards ────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  margin-bottom: 16px;
  overflow: hidden;
}

.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border2);
  background: var(--surface2);
}
.card-icon { font-size: 14px; }
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text3);
}

/* ── Starter code ─────────────────────── */
.starter-code {
  font-family: var(--font-mono); font-size: 12.5px;
  line-height: 1.75; padding: 16px 18px;
  color: #c8c4f0; white-space: pre; overflow-x: auto;
  background: #0a0918;
  border-bottom: 1px solid var(--border2);
}

/* ── Tasks ────────────────────────────── */
.task-list { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
.task-item { display: flex; gap: 12px; align-items: flex-start; }
.task-num {
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--purple2); color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.task-text { font-size: 13.5px; color: var(--text2); line-height: 1.65; }

/* ── Hint ─────────────────────────────── */
.hint-box {
  background: var(--amber-dim);
  border-left: 3px solid var(--amber);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 12px 16px;
  font-size: 13px; color: #d4903a; line-height: 1.65;
}
.deliverable-box {
  background: var(--teal-dim);
  border-left: 3px solid var(--teal);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 12px 16px;
  font-size: 13px; color: var(--teal); line-height: 1.65;
}

/* ── Code Editor ──────────────────────── */
.editor-container {
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.editor-container:focus-within {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(124,111,247,0.12);
}

.editor-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
}
.editor-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.ed1 { background: #f06060; }
.ed2 { background: var(--amber); }
.ed3 { background: var(--teal); }
.editor-filename {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text3); margin-left: 4px; flex: 1;
}
.editor-lang {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--purple3); letter-spacing: 0.06em;
}

.code-editor {
  width: 100%; min-height: 280px;
  background: #070714; color: #c8c4f0;
  border: none; outline: none; resize: vertical;
  font-family: var(--font-mono); font-size: 13px;
  line-height: 1.75; padding: 16px 18px;
  tab-size: 4; white-space: pre;
  overflow-wrap: normal; overflow-x: auto;
  display: block;
}
.code-editor::placeholder { color: var(--text3); }

/* ── Submit row ───────────────────────── */
.submit-row {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}

.submit-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px; border: none; border-radius: var(--r);
  background: var(--purple2); color: #fff;
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all var(--transition);
  box-shadow: 0 4px 20px rgba(83,74,183,0.35);
}
.submit-btn:hover {
  background: var(--purple);
  box-shadow: 0 6px 28px rgba(124,111,247,0.45);
  transform: translateY(-1px);
}
.submit-btn:active { transform: scale(0.98) translateY(0); }
.submit-btn.success { background: #1a6e58; box-shadow: 0 4px 20px rgba(0,212,170,0.3); }

.save-draft-btn {
  padding: 12px 20px; border-radius: var(--r);
  background: transparent; border: 1px solid var(--border);
  color: var(--text2); font-family: var(--font-display);
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all var(--transition);
}
.save-draft-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

.submit-status {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text3); flex: 1;
}
.submit-status.ok { color: var(--teal); }

/* ── Progress bar ─────────────────────── */
.prog-wrap {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(7,7,15,0.9); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border2);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
}
.prog-label {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text3); flex-shrink: 0;
}
.prog-bar { flex: 1; display: flex; gap: 3px; }
.prog-seg {
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--surface3); cursor: pointer;
  transition: background var(--transition), transform 0.15s;
}
.prog-seg:hover { transform: scaleY(2); }
.prog-seg.done { background: var(--teal); }
.prog-seg.active { background: var(--purple); }
.prog-seg.draft { background: var(--amber); }
.prog-count {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text3); flex-shrink: 0;
}

/* ── Nav btns ─────────────────────────── */
.nav-row {
  display: flex; align-items: center; gap: 12px;
  margin-top: 20px; margin-bottom: 80px; padding-top: 8px;
  border-top: 1px solid var(--border2);
}
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: var(--r);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-family: var(--font-display);
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all var(--transition);
}
.nav-btn:hover:not(:disabled) { border-color: var(--purple); color: var(--purple3); background: rgba(124,111,247,0.08); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.next-q { background: var(--purple2); border-color: var(--purple2); color: #fff; }
.nav-btn.next-q:hover:not(:disabled) { background: var(--purple); border-color: var(--purple); }
.nav-counter { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 12px; color: var(--text3); }

/* ═══════════════════════════════════════
   SUBMISSIONS PANEL
═══════════════════════════════════════ */
#submissions-panel {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(7,7,15,0.85); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
#submissions-panel.show { display: flex; }

.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%; max-width: 780px;
  max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 0 80px rgba(0,0,0,0.6);
  animation: panelIn 0.35s cubic-bezier(0.34,1.3,0.64,1) forwards;
}
@keyframes panelIn {
  from { transform: scale(0.92) translateY(16px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.panel-header {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 24px; border-bottom: 1px solid var(--border2);
}
.panel-title {
  font-size: 18px; font-weight: 700; letter-spacing: -0.01em; flex: 1;
}
.panel-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text2);
  transition: all var(--transition);
}
.panel-close:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

.panel-filters {
  display: flex; gap: 8px; padding: 16px 24px;
  border-bottom: 1px solid var(--border2);
  overflow-x: auto; flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: transparent;
  color: var(--text3); cursor: pointer; transition: all var(--transition);
  white-space: nowrap; font-family: var(--font-mono);
}
.filter-chip:hover { border-color: var(--purple3); color: var(--purple3); }
.filter-chip.sel { background: rgba(124,111,247,0.15); border-color: var(--purple); color: var(--purple3); }

.panel-body {
  flex: 1; overflow-y: auto; padding: 16px 24px;
  display: flex; flex-direction: column; gap: 12px;
}

.sub-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r2);
  overflow: hidden;
  transition: border-color var(--transition);
}
.sub-card:hover { border-color: var(--border); }

.sub-card-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; cursor: pointer;
}
.sub-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple2), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.sub-meta { flex: 1; }
.sub-name { font-size: 14px; font-weight: 600; color: var(--text); }
.sub-info { font-family: var(--font-mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
.sub-q-badge {
  padding: 3px 10px; border-radius: 999px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  background: rgba(124,111,247,0.15); color: var(--purple3);
}
.sub-expand { font-size: 18px; color: var(--text3); transition: transform var(--transition); }
.sub-card.open .sub-expand { transform: rotate(180deg); }

.sub-code-wrap {
  display: none; border-top: 1px solid var(--border2);
}
.sub-card.open .sub-code-wrap { display: block; }
.sub-code {
  font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
  padding: 14px 16px; background: #070714; color: #c8c4f0;
  white-space: pre; overflow-x: auto;
  max-height: 280px; overflow-y: auto;
}

.empty-state {
  text-align: center; padding: 48px 24px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  z-index: 9000; padding: 12px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 13px; font-weight: 600; color: var(--text);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.3,0.64,1);
  font-family: var(--font-mono); white-space: nowrap;
  pointer-events: none;
}
#toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}
#toast.teal { border-color: var(--teal); color: var(--teal); }
#toast.amber { border-color: var(--amber); color: var(--amber); }

/* ═══════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Online / Offline indicator ── */
#net-status {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 999px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  border: 1px solid transparent;
  transition: all 0.4s ease;
  flex-shrink: 0;
}
#net-status.online  { background: rgba(0,212,170,0.12); color: var(--teal);  border-color: rgba(0,212,170,0.25); }
#net-status.offline { background: var(--red-dim);        color: var(--red);   border-color: rgba(240,96,96,0.3);  }
#net-status .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}
#net-status.online .dot { animation: pulse-dot 1.6s ease infinite; }
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.4; transform:scale(0.7); }
}

/* ── Sync queue badge ── */
#sync-badge {
  display: none;
  padding: 3px 8px; border-radius: 999px;
  background: var(--amber-dim); color: var(--amber);
  border: 1px solid rgba(240,160,48,0.3);
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  cursor: pointer;
}
#sync-badge.show { display: inline-flex; align-items: center; gap: 4px; }

.submit-all-btn {
  background: linear-gradient(135deg, var(--teal), #00a882) !important;
  color: #fff !important;
  border-color: var(--teal) !important;
  font-weight: 700 !important;
  box-shadow: 0 4px 18px rgba(0,212,170,0.35) !important;
}
.submit-all-btn:hover {
  background: linear-gradient(135deg, #00e8bb, var(--teal)) !important;
  box-shadow: 0 6px 26px rgba(0,212,170,0.55) !important;
  transform: translateY(-1px);
}

/* Mobile */
@media (max-width: 700px) {
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main-content { padding: 20px 16px; }
  .topbar { padding: 0 14px; gap: 10px; }
  .topbar-badge { display: none; }
  .submissions-btn span { display: none; }
}

    setup:`import torch, torch.nn as nn

class MinimalVQA(nn.Module):
    def __init__(self, img_dim, text_dim, n_answers=10):
        super().__init__()
        self.fusion = nn.Linear(img_dim + text_dim, 256)
        self.head = nn.Linear(256, n_answers)

    def forward(self, img_feat, text_feat):

/* ════════════════════════════════════════
   STORAGE ENGINE
   Priority: Firebase (shared/online) → localStorage (offline fallback)
   Offline writes are queued and flushed when connectivity returns.
════════════════════════════════════════ */

const LS_PREFIX   = 'fusion_a2_';
const LS_QUEUE    = 'fusion_a2_syncq';

/* ---------- localStorage helpers ---------- */
function lsGet(key) {
  try { return localStorage.getItem(LS_PREFIX + key); } catch { return null; }
}
function lsSet(key, val) {
  try { localStorage.setItem(LS_PREFIX + key, val); return true; } catch { return false; }
}
function lsDel(key) {
  try { localStorage.removeItem(LS_PREFIX + key); } catch {}
}
function lsKeys(prefix) {
  const out = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS_PREFIX + prefix)) {
        out.push(k.slice(LS_PREFIX.length));
      }
    }
  } catch {}
  return out;
}

/* ---------- Sync queue (offline writes) ---------- */
function queueLoad() {
  try { return JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); } catch { return []; }
}
function queueSave(q) {
  try { localStorage.setItem(LS_QUEUE, JSON.stringify(q)); } catch {}
}
function queueAdd(op) {          // op: { type:'set'|'del', key, val }
  const q = queueLoad();
  const existing = q.findIndex(x => x.key === op.key);
  if (existing !== -1) q.splice(existing, 1);
  q.push(op);
  queueSave(q);
  updateSyncBadge();
}
function updateSyncBadge() {
  const badge = document.getElementById('sync-badge');
  if (!badge) return;
  const n = queueLoad().length;
  if (n > 0) { badge.textContent = `⬆ ${n} pending`; badge.classList.add('show'); }
  else        { badge.classList.remove('show'); }
}

/* ---------- Firebase path ---------- */
function fbPath(key) {
  // Flatten key to valid Firebase path: replace : and spaces
  return key.replace(/[:.#$[\]]/g, '_');
}

/* ---------- Online / offline ---------- */
let isOnline = navigator.onLine;
function setOnline(val) {
  isOnline = val;
  const el = document.getElementById('net-status');
  const lb = document.getElementById('net-label');
  if (!el) return;
  el.className = val ? 'online' : 'offline';
  if (lb) lb.textContent = val ? 'Online' : 'Offline';
  if (val) flushQueue();
}
window.addEventListener('online',  () => setOnline(true));
window.addEventListener('offline', () => setOnline(false));

/* ---------- Flush queue to Firebase ---------- */
async function flushQueue() {
  if (!isOnline || !window._fbReady) return;
  const q = queueLoad();
  if (!q.length) return;
  const { db, ref, set, remove } = window._fb;
  const done = [];
  for (const op of q) {
    try {
      if (op.type === 'set') {
        await set(ref(db, fbPath(op.key)), op.val);
      } else if (op.type === 'del') {
        await remove(ref(db, fbPath(op.key)));
      }
      done.push(op.key);
    } catch (e) { /* leave in queue, retry later */ }
  }
  if (done.length) {
    const remaining = q.filter(x => !done.includes(x.key));
    queueSave(remaining);
    updateSyncBadge();
    if (done.length > 0) showToast(`☁ Synced ${done.length} item(s)`, 'teal');
  }
}

/* ---------- Main storage API ---------- */
// storageGet — tries Firebase first, falls back to localStorage
async function storageGet(key) {
  if (isOnline && window._fbReady) {
    try {
      const { db, ref, get } = window._fb;
      const snap = await get(ref(db, fbPath(key)));
      if (snap.exists()) {
        const val = typeof snap.val() === 'string' ? snap.val() : JSON.stringify(snap.val());
        lsSet(key, val);   // keep local copy fresh
        return { value: val };
      }
    } catch {}
  }
  // Offline or Firebase failed — use localStorage
  const val = lsGet(key);
  return val !== null ? { value: val } : null;
}

// storageSet — writes to localStorage immediately, Firebase if online (else queues)
async function storageSet(key, val) {
  lsSet(key, val);
  if (isOnline && window._fbReady) {
    try {
      const { db, ref, set } = window._fb;
      await set(ref(db, fbPath(key)), val);
      return true;
    } catch {}
  }
  // Offline: queue for later
  queueAdd({ type: 'set', key, val });
  return true;   // local write succeeded
}

// storageDel
async function storageDel(key) {
  lsDel(key);
  if (isOnline && window._fbReady) {
    try {
      const { db, ref, remove } = window._fb;
      await remove(ref(db, fbPath(key)));
      return;
    } catch {}
  }
  queueAdd({ type: 'del', key });
}

// storageList — lists all keys matching prefix from BOTH localStorage and Firebase
async function storageList(prefix) {
  const localKeys = lsKeys(prefix);
  if (!isOnline || !window._fbReady) return localKeys;
  // For submissions panel we need all users' data — scan Firebase
  // Firebase REST approach via get on root is simplest for small datasets
  try {
    const { db, ref, get } = window._fb;
    const snap = await get(ref(db, '/'));
    if (!snap.exists()) return localKeys;
    const all = snap.val();
    const fbKeys = Object.keys(all || {})
      .map(k => k.replace(/_/g, ':'))   // reverse our path encoding for : only
      .filter(k => k.startsWith(prefix));
    // Merge and deduplicate
    const merged = [...new Set([...localKeys, ...fbKeys])];
    return merged;
  } catch { return localKeys; }
}

async function buildProgressBar() {
  const bar = document.getElementById('progBar');

  let doneCount = 0;
  for (let i = 0; i < Q.length; i++) {
    const seg = document.createElement('div');
    const subKey = `sub:${currentUser}:q${i}`;
    const sub = lsGet(subKey);

    else if (i === currentQ) seg.className = 'prog-seg active';
    else seg.className = 'prog-seg';

  document.getElementById('progCount').textContent = `${doneCount}/${Q.length}`;

/* ════════════════════════════════════════
   SUBMIT / DRAFT
════════════════════════════════════════ */
async function submitCode(idx) {
  const editor = document.getElementById('codeEditor');
  const code = editor ? editor.value.trim() : '';
  if (!code) {
    showToast('Write some code first!', 'amber');
    return;
  }

  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.textContent = 'Submitting…'; btn.disabled = true; }

  const payload = JSON.stringify({
    code,
    name: currentUser,
    q: Q[idx].num,
    qTitle: Q[idx].title,
    ts: Date.now(),
    marks: Q[idx].marks
  });

  const subKey = `sub:${currentUser}:q${idx}`;
  const ok = await storageSet(subKey, payload);

  if (ok) {
    // Remove draft
    delete drafts[idx];
    await storageDel(`draft:${currentUser}:q${idx}`);
    showToast('✓ Submitted!', 'teal');
    await renderQ(idx);
  } else {
    showToast('Save failed — try again', 'amber');
    if (btn) { btn.textContent = '🚀 Submit'; btn.disabled = false; }
  }
}

async function saveDraft(idx) {
  const code = document.getElementById('codeEditor')?.value || '';
  drafts[idx] = code;
  lsSet(`draft:${currentUser}:q${idx}`, code);
  showToast('Draft saved', 'amber');
  updateStatuses();
  buildProgressBar();
}

async function saveDraftSilent(idx) {
  const code = document.getElementById('codeEditor')?.value || '';
  if (!code) return;
  drafts[idx] = code;
  lsSet(`draft:${currentUser}:q${idx}`, code);
  const st = document.getElementById('statusText');
  if (st) { st.textContent = 'Draft autosaved'; st.className = 'submit-status'; }
  updateStatuses();
}

async function clearSubmission(idx) {
  if (!confirm('Remove submission and edit?')) return;
  const key = `sub:${currentUser}:q${idx}`;
  lsDel(key);
  await storageDel(key);
  await renderQ(idx);
  updateStatuses();
  buildProgressBar();
}

async function loadPanel() {
  document.getElementById('panelBody').innerHTML = `
    <div class="empty-state"><div class="empty-icon" style="font-size:28px;animation:orbBreath 1s infinite alternate">⏳</div>Loading submissions…</div>`;

  const submissions = [];

  // ── Pull from Firebase (all users' data) ──────────────────
  if (isOnline && window._fbReady) {
    try {
      const { db, ref, get } = window._fb;
      const snap = await get(ref(db, '/'));
      if (snap.exists()) {
        const all = snap.val() || {};
        for (const [rawKey, rawVal] of Object.entries(all)) {
          // Firebase key: sub_username_qi  →  original: sub:username:qi
          const key = rawKey.replace(/_/g, ':');
          if (!key.startsWith('sub:')) continue;
          try {
            const val = typeof rawVal === 'string' ? rawVal : JSON.stringify(rawVal);
            const d = JSON.parse(val);
            submissions.push({ key, ...d });
            lsSet(key, val);  // cache locally
          } catch {}
        }
      }
    } catch (e) {
      showToast('Could not reach server — showing local data', 'amber');
    }
  }

  // ── If offline or Firebase returned nothing, fall back to localStorage ──
  if (!submissions.length) {
    const localKeys = lsKeys('sub:');
    for (const key of localKeys) {
      const val = lsGet(key);
      if (!val) continue;
      try {
        const d = JSON.parse(val);
        submissions.push({ key, ...d });
      } catch {}
    }
  }

  // Sort by timestamp desc
  submissions.sort((a,b) => b.ts - a.ts);

  // Build filters
  const users = [...new Set(submissions.map(s => s.name))];
  const qs = [...new Set(submissions.map(s => s.q))].sort();

  const filtersHtml = `
    <div class="filter-chip ${panelFilterQ==='all'?'sel':''}" onclick="filterPanel('all','q')">All Questions</div>
    ${qs.map(q => `<div class="filter-chip ${panelFilterQ===q?'sel':''}" onclick="filterPanel('${q}','q')">${q}</div>`).join('')}
    <div style="flex:1"></div>
    <div class="filter-chip ${panelFilterUser==='all'?'sel':''}" onclick="filterPanel('all','user')">All Users</div>
    ${users.map(u => `<div class="filter-chip ${panelFilterUser===u?'sel':''}" onclick="filterPanel('${escHtml(u)}','user')">${escHtml(u)}</div>`).join('')}
  `;
  document.getElementById('panelFilters').innerHTML = filtersHtml;

  // Filter
  const filtered = submissions.filter(s =>
    (panelFilterQ === 'all' || s.q === panelFilterQ) &&
    (panelFilterUser === 'all' || s.name === panelFilterUser)
  );

  if (!filtered.length) {
    document.getElementById('panelBody').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        No submissions yet. Be the first!
      </div>`;
    return;
  }

  document.getElementById('panelBody').innerHTML = filtered.map((s, i) => `
    <div class="sub-card" id="sc-${i}">
      <div class="sub-card-header" onclick="toggleSubCard(${i})">
        <div class="sub-avatar">${s.name.charAt(0).toUpperCase()}</div>
        <div class="sub-meta">
          <div class="sub-name">${escHtml(s.name)}</div>
          <div class="sub-info">${formatTime(s.ts)} &nbsp;·&nbsp; ${s.marks} marks</div>
        </div>
        <div class="sub-q-badge">${s.q}</div>
        <div class="sub-expand">⌄</div>
      </div>
      <div class="sub-code-wrap">
        <div class="sub-code">${escCode(s.code || '')}</div>
      </div>
    </div>
  `).join('');
}

function filterPanel(val, type) {
  if (type === 'q') panelFilterQ = val;
  else panelFilterUser = val;
  loadPanel();
}

function toggleSubCard(i) {
  document.getElementById('sc-'+i).classList.toggle('open');
}

/* ════════════════════════════════════════
   LOGOUT
════════════════════════════════════════ */
function logout() {
  if (!confirm('Switch user?')) return;
  currentUser = '';
  drafts = {};
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').classList.add('show');
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').focus();
  showLogin();
}

/* ════════════════════════════════════════
   SUBMIT ALL
════════════════════════════════════════ */
async function submitAll() {
  // Count submitted questions
  let submittedCount = 0;
  const notSubmitted = [];
  for (let i = 0; i < Q.length; i++) {
    const subKey = `sub:${currentUser}:q${i}`;
    const r = lsGet(subKey);
    if (r) {
      submittedCount++;
    } else {
      notSubmitted.push(`Q${i+1}`);
    }
  }

  if (submittedCount === 0) {
    showToast('No questions submitted yet!', 'amber');
    return;
  }

  if (notSubmitted.length > 0) {
    const proceed = confirm(
      `You have submitted ${submittedCount}/${Q.length} questions.\n` +
      `Not yet submitted: ${notSubmitted.join(', ')}\n\n` +
      `Do you want to finalize and submit all answered questions?`
    );
    if (!proceed) return;
  } else {
    const proceed = confirm(
      `All ${Q.length} questions are submitted!\n\nClick OK to finalize your assignment.`
    );
    if (!proceed) return;
  }

  // Mark assignment as finalized
  const finalPayload = JSON.stringify({
    name: currentUser,
    ts: Date.now(),
    submitted: submittedCount,
    total: Q.length
  });
  await storageSet(`final:${currentUser}`, finalPayload);

  showToast(`🎉 Assignment submitted! (${submittedCount}/${Q.length} questions)`, 'teal');

  // Show a summary overlay
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div style="text-align:center;padding:60px 24px;animation:contentIn 0.4s ease forwards;">
      <div style="font-size:64px;margin-bottom:20px;">🎓</div>
      <div style="font-size:28px;font-weight:800;color:var(--text);margin-bottom:10px;letter-spacing:-0.02em;">Assignment Submitted!</div>
      <div style="font-size:15px;color:var(--text2);margin-bottom:32px;">
        <span style="color:var(--teal);font-weight:700;">${submittedCount}</span> of <span style="font-weight:700;">${Q.length}</span> questions submitted by <span style="color:var(--purple3);font-weight:700;">${escHtml(currentUser)}</span>
      </div>
      <div style="display:inline-flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;">
        ${Q.map((_,i) => `
          <div id="final-badge-${i}" style="width:44px;height:44px;border-radius:50%;background:var(--surface3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text3);">Q${i+1}</div>
        `).join('')}
      </div>
      <button onclick="renderQ(0)" style="padding:12px 28px;background:var(--purple2);border:none;border-radius:var(--r);color:#fff;font-family:var(--font-display);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.03em;box-shadow:0 4px 24px rgba(83,74,183,0.4);">
        ← Review Answers
      </button>
    </div>
  `;

  // Colour badges based on submission status
  for (let i = 0; i < Q.length; i++) {
    const subKey = `sub:${currentUser}:q${i}`;
    const r = lsGet(subKey);
    const badge = document.getElementById(`final-badge-${i}`);
    if (badge) {
      if (r) {
        badge.style.background = 'rgba(0,212,170,0.15)';
        badge.style.borderColor = 'var(--teal)';
        badge.style.color = 'var(--teal)';
        badge.style.boxShadow = '0 0 8px rgba(0,212,170,0.4)';
      } else {
        badge.style.background = 'var(--red-dim)';
        badge.style.borderColor = 'var(--red)';
        badge.style.color = 'var(--red)';
      }
    }
  }
}

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escCode(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-IN', {day:'numeric',month:'short'}) +
    ' ' + d.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
}

let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 2600);
}
</script>
